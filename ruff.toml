# Конфигурация линтинга для утилиты обновления прошивок YADRO Vegman Rx20.
# Целевой рантайм — Python 3.9 (на хосте используется встроенный 3.9.25).
line-length = 100
target-version = "py39"

[lint]
# E/W — pycodestyle, F — pyflakes, I — isort, B — flake8-bugbear.
# pyupgrade (UP) намеренно не включён: код единообразно использует %-форматирование,
# а для логирования (`log.info("...", arg)`) ленивый %-стиль — корректный и предпочтительный.
select = ["E", "F", "W", "I", "B"]
